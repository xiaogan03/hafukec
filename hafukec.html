<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no,viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="Description" content="信息予你无限">
<meta name="Keywords" content="信息予你无限">
<link rel="icon" href="https://game.gtimg.cn/images/dfm/cp/havvkrelink/logo2.png">
<title>信息予你无限</title>
<style>
/* ============ CSS Reset ============ */
body,div,dl,dt,dd,ul,ol,li,h1,h2,h3,h4,h5,h6,pre,form,fieldset,input,textarea,p,blockquote,th,td{margin:0;padding:0;}
table{border-collapse:collapse;border-spacing:0;}
address,caption,cite,code,dfn,em,strong,th,var{font-weight:normal;font-style:normal;}
ol,ul{list-style:none;}
caption{text-align:left;}
h1,h2,h3,h4,h5,h6{font-weight:normal;font-size:100%;}
fieldset,img,abbr,acronym{border:0;}
a{text-decoration:none;overflow:hidden;}
.hide{display:block;width:0;height:0;overflow:hidden;}
*{box-sizing:border-box;}

/* ============ Base ============ */
html,body{
  min-width:12rem;
  font-size:calc(100 / 3840 * 100vw);
  overflow:hidden auto;
}
body{
  font:20px/1.5 'fzlth','simhei',tahoma,'\5b8b\4f53',"\9ED1\4F53",sans-serif;overflow-x:hidden;background:#ecf3fa;
}

@font-face{
  font-family:'fzlth';
  src:url('./字体/fzlth.woff') format('truetype');
}
@font-face{
  font-family:'fzltzh';
  src:url('./字体/fzltzh.woff') format('truetype');
}
@font-face{
  font-family:'fzltth';
  src:url('./字体/fzltth.woff') format('truetype');
}

input{font-family:'fzlth';}

/* autofill fix */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active{
  font-size:0.3rem !important;
  font-family:'fzlth',sans-serif !important;
  -webkit-text-size-adjust:100% !important;
  -webkit-font-smoothing:antialiased !important;
  box-shadow:0 0 0 100px #efefef inset !important;
}
.form-group input:-webkit-autofill,
.form-group input:-webkit-autofill:hover,
.form-group input:-webkit-autofill:focus,
.form-group input:-webkit-autofill:active{
  font-size:0.3rem !important;
  font-family:'fzlth',sans-serif !important;
  color:#000000 !important;
}
input[type="text"],
input[type="password"]{
  font-family:'fzlth' !important;
  font-size:0.3rem !important;
  line-height:1.5 !important;
  padding:0.1rem 0.3rem !important;
  height:0.98rem !important;
  box-sizing:border-box !important;
  display:flex;
  align-items:center;
}
input[type="password"]{
  text-align:left;
  vertical-align:middle;
  -webkit-text-security:disc;
  text-security:disc;
}

/* ============ Overlays ============ */
.admin-overlay,.password-overlay,.unlocked-overlay{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/rp3.jpg) no-repeat 50% 50%;
  background-size:cover;
  width:100vw;height:100vh;z-index:9999;
  position:fixed;top:0;left:0;
  display:none;
}
.password-overlay,.unlocked-overlay{
  background:rgba(0,0,0,0.5);
}

/* Login / Password / Unlocked Box */
.login-box,.password-box,.unlocked-box{
  width:7.92rem;padding:0.4rem 0 1rem;
  background:#ffffff;border-radius:0.2rem;
  box-shadow:0 0 0.5rem rgba(133,150,170,0.5);
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
}
.login-box,.password-box{animation:loginanim 0.5s ease-in-out;}

@keyframes loginanim{
  0%{transform:translate(-50%,-40%);opacity:0;}
  100%{transform:translate(-50%,-50%);opacity:1;}
}

.login-logo{
  display:block;width:1.71rem;height:2.45rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/logo1.png) no-repeat 50% 0;
  background-size:100% auto;margin:0 auto;
}
.login-txt{
  display:flex;justify-content:space-between;align-items:center;
  margin:0.28rem auto;font-size:0.22rem;color:#494949;
  text-align:center;line-height:0.5rem;
}
.login-txt i{width:2.3rem;height:0.02rem;background:#d3d3d3;}

.form-group{margin:0 auto 0.24rem;width:6.7rem;}
.form-group label{
  font-size:0.28rem;color:#494949;line-height:0.5rem;
  margin-bottom:0.16rem;display:block;font-family:'fzltzh';
}
.form-group input{
  width:6.7rem;height:0.98rem;border:0.02rem solid #d0d0d0;
  border-radius:0.1rem;padding:0.1rem 0.3rem;margin:0 auto;
  display:block;background:#efefef;font-size:0.3rem;color:#555555;
}

.login-btn{
  display:flex;justify-content:center;align-items:center;flex-direction:column;
  margin:0.6rem auto 0;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/btn3.png) no-repeat 50% 0;
  background-size:100% auto;
  width:4.11rem;height:0.95rem;
  font-size:0.3428rem;color:#ffffff;text-align:center;line-height:0.44rem;
  transition:all 0.2s ease-in-out;cursor:pointer;
}
.login-btn span{display:block;font-size:0.14rem;text-transform:uppercase;line-height:0.2rem;}
.login-btn:hover{filter:brightness(1.1) drop-shadow(0 0.02rem 0.1rem #c6c7cb);}

.login-error{
  font-size:0.26rem;color:#ff0000;text-align:center;line-height:0.5rem;
  margin:0.3rem auto 0;position:absolute;width:100%;left:0;bottom:0.4rem;
  display:none;animation:headShake 1s linear;
}
@keyframes headShake{
  0%{transform:translateX(0)}
  6.5%{transform:translateX(-6px) rotateY(-9deg)}
  18.5%{transform:translateX(5px) rotateY(7deg)}
  31.5%{transform:translateX(-3px) rotateY(-5deg)}
  43.5%{transform:translateX(2px) rotateY(3deg)}
  50%{transform:translateX(0)}
}

/* ============ Folder / Doc View ============ */
.folder-box,.doc-picbox{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/rp4.jpg) no-repeat 50% 0 fixed;
  background-size:cover;
  width:100vw;height:100vh;z-index:9999;
  position:fixed;top:0;left:0;overflow:hidden auto;
  display:none;
}
.folder-title,.doc-title{
  position:absolute;top:0;left:0;height:2.8rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/rp4.jpg) no-repeat 50% 0 fixed;
  background-size:100% auto;z-index:10;width:100%;
}
.folder-tit{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/title1.png) no-repeat 50% 50%;
  background-size:38.4rem auto;width:100%;height:100%;font-size:0;
}
.folder-logout{
  position:absolute;top:1.12rem;right:1.26rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/btn4.png) no-repeat 50% 0;
  background-size:100% auto;
  width:4.52rem;height:0.97rem;
  font-size:0.36rem;color:#5894de;text-align:center;line-height:0.96rem;
  font-family:'fzltzh';cursor:pointer;
  transition:all 0.2s ease-in-out;
}
.folder-logout:hover{filter:brightness(1.1);box-shadow:0 0.02rem 0.2rem #85b1e7;}

/* new folder/doc buttons */
.folder-new{position:absolute;top:1.12rem;right:6.4rem;background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/btn4.png) no-repeat 50% 0;background-size:100% auto;width:4.52rem;height:0.97rem;font-size:0.36rem;color:#5894de;text-align:center;line-height:0.96rem;font-family:'fzltzh';cursor:pointer;transition:all 0.2s ease-in-out;}
.folder-new:hover{filter:brightness(1.1);box-shadow:0 0.02rem 0.2rem #85b1e7;}
.doc-new{position:absolute;top:1rem;right:5.6rem;background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/btn5.png) no-repeat 50% 0;background-size:100% auto;width:2.92rem;height:0.97rem;font-size:0.36rem;color:#5894de;text-align:center;line-height:0.96rem;font-family:'fzltzh';cursor:pointer;transition:all 0.2s ease-in-out;}
.doc-new:hover{filter:brightness(1.1);box-shadow:0 0.02rem 0.2rem #85b1e7;}

.folder-content,.doc-content{padding-top:3.08rem;}
.folder-content{animation:contentanim 0.5s ease-in-out;}
@keyframes contentanim{
  0%{transform:translateY(-1rem);opacity:0;}
  100%{transform:translateY(0);opacity:1;}
}

.folder-ct,.doc-ct{
  width:17.74rem;display:flex;justify-content:flex-start;
  align-items:flex-start;flex-wrap:wrap;margin:0 auto;
}
.doc-ct{width:12.2rem;}

.folder-ct a,.doc-ct a{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/bg2.png) no-repeat 50% 0;
  background-size:100% auto;
  width:5.4rem;height:4.2rem;margin:0 0.25rem 0.5rem;
  border-radius:0.1rem;box-shadow:0 0 0.3rem rgba(175,193,214,0.3);
  display:flex;justify-content:center;align-items:center;flex-direction:column;
  transition:all 0.2s ease-in-out;cursor:pointer;
}
.folder-ct a:hover,.doc-ct a:hover{
  transform:translateY(-0.1rem);
  box-shadow:0 0.2rem 0.3rem rgba(175,193,214,0.8);
}
.folder-ct a img,.doc-ct a img{display:block;width:1.44rem;margin:0 auto;}
.doc-ct a img{width:4.22rem;height:2.38rem;object-fit:cover;}
.folder-name{
  font-size:0.34rem;color:#494949;text-align:center;line-height:0.42rem;
  font-family:'fzltzh';margin:0.26rem auto 0;
}

.suo-txt1,.suo-txt2{
  display:flex;justify-content:center;align-items:center;
  font-size:0.26rem;color:#9fb0cb;text-align:center;line-height:0.34rem;
  margin:0.2rem auto 0;
}
.suo-txt1 i,.suo-txt2 i{
  width:0.21rem;height:0.3rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/folder_icon1.png) no-repeat 50% 0;
  background-size:100% auto;margin-right:0.2rem;
}
.suo-txt2 i{background-image:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/folder_icon2.png);}
.suo-txt2{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/folder_btn1.png) no-repeat 50% 0;
  background-size:100% auto;
  width:2.87rem;height:0.68rem;color:#ffffff;font-family:'fzltzh';
}

/* folder action buttons */
.folder-actions{position:absolute;bottom:0.16rem;right:0.2rem;display:flex;gap:0.1rem;opacity:0;transition:opacity 0.15s;}
.folder-ct a:hover .folder-actions{opacity:1;}
.folder-btn{width:0.56rem;height:0.56rem;border:1px solid #c5daec;border-radius:0.08rem;background:rgba(255,255,255,0.9);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.24rem;color:#5894de;transition:all 0.15s;position:relative;z-index:5;}
.folder-btn:hover{background:#e8f4ff;border-color:#2362af;color:#2362af;}
.folder-btn.del:hover{background:#fff5f5;border-color:#d32f2f;color:#d32f2f;}

.doc-tit{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/tit_bg1.png) no-repeat 50% 50%;
  background-size:38.4rem auto;width:100%;height:100%;
  font-size:0.6rem;color:#403f3f;text-align:center;line-height:2.8rem;
  font-family:'fzltth';display:flex;justify-content:center;align-items:center;
}
.doc-back{
  position:absolute;top:1rem;right:2.1rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/btn5.png) no-repeat 50% 0;
  background-size:100% auto;
  width:2.92rem;height:0.97rem;
  font-size:0.36rem;color:#5894de;text-align:center;line-height:0.96rem;
  font-family:'fzltzh';cursor:pointer;
  transition:all 0.2s ease-in-out;
}
.doc-back:hover{filter:brightness(1.1);box-shadow:0 0.02rem 0.2rem #85b1e7;}

.doc-ct a i{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/doc1.png) no-repeat 50% 0;
  background-size:100% auto;
  width:1.42rem;height:1.72rem;margin:0 auto;display:block;
}
.doc-ct a.doc-suo i{
  background-image:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/doc2.png);
}
.doc-name{
  font-size:0.3rem;color:#494949;text-align:center;line-height:0.4rem;
  margin:0.4rem auto 0;
}

/* ============ Document Detail ============ */
.doc-text{
  width:26.26rem;padding:0.58rem 1.06rem;margin:0 auto 1rem;
  background:#ffffff;border-radius:0.2rem;
  box-shadow:0 0 0.3rem rgba(175,193,214,0.3);
}

.doc-text h3 i{display:none;}
.doc-text p,.doc-text ul{
  font-size:0.26rem;color:#6d7888;text-align:left;line-height:0.46rem;
  margin:0.2rem auto 0;width:23.3rem;
}
.doc-text img{display:block;width:100%;}
.doc-table{
  width:24.1rem;margin:0.44rem auto 0;background:#fafdff;
  font-size:0.3rem;color:#494949;text-align:left;line-height:0.4rem;
}
.doc-table th{
  height:1.1rem;color:#2362af;font-family:'fzltzh';
  background:#eff8ff;padding:0 0.88rem;
}
.doc-table td{padding:0 0.88rem;height:1.1rem;}
.doc-table td:first-child{width:35%;}
.doc-table td.copy-code{cursor:pointer;color:#2362af;font-family:monospace;transition:all 0.15s;}
.doc-table td.copy-code:hover{color:#038aff;background:#e8f4ff;}
.doc-table td.copy-code.copied{color:#20c75e;}
.col1{color:#20c75e;}
.col2{color:#dd7d0b;}
.col3{color:#e61a29;}

.doc-text ul li{
  font-size:0.26rem;color:#6d7888;text-align:left;line-height:0.62rem;
  position:relative;
}
.doc-text ul li::after{
  position:absolute;top:50%;left:-0.32rem;
  width:0.1rem;height:0.1rem;background:#2362af;border-radius:50%;
  transform:translateY(-50%);content:'';
}

/* ============ Image Viewer ============ */
.doc-picct{
  width:30.48rem;height:96%;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
}
.doc-picct img{width:100%;height:calc(100% - 1.3rem);object-fit:contain;}
.pic-name{
  height:1.1rem;display:flex;justify-content:flex-start;align-items:center;
  font-size:0.3rem;color:#494949;line-height:0.4rem;text-align:left;
}
.pic-name i{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/doc_icon1.png) no-repeat 50% 0;
  background-size:100% auto;width:0.45rem;height:0.45rem;margin-right:0.2rem;
}
.doc-close{
  position:absolute;top:0.4rem;right:0;width:0.52rem;height:0.52rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/doc_close.png) no-repeat 50% 0;
  background-size:100% auto;cursor:pointer;
}
.btn-down{
  position:absolute;top:0.36rem;right:0.8rem;width:0.8rem;height:0.57rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/down.png) no-repeat 50% 0;
  background-size:100% auto;cursor:pointer;
}

/* ============ Password Overlay ============ */
.password-box{padding-top:0.6rem;}
.password-suo{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/folder_icon3.png) no-repeat 50% 0;
  background-size:100% auto;width:0.87rem;height:1.2rem;margin:0 auto;display:block;
}
.password-tit{
  font-size:0.5rem;color:#494949;text-align:center;line-height:0.6rem;
  margin:0.4rem auto 0;font-family:'fzlttzh';
}
.password-desc{
  font-size:0.3rem;color:#858484;text-align:center;line-height:0.4rem;
  margin:0.2rem auto 0;font-family:'fzlttzh';
}
.password-btn{
  display:flex;justify-content:space-between;align-items:center;
  margin:0.52rem auto 0;width:6.7rem;
}
.password-btn a{
  font-size:0.28rem;color:#ffffff;border-radius:0.05rem;
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/btn6.png) no-repeat 50% 0;
  background-size:6.7rem auto;
  width:3.22rem;height:1.04rem;text-align:center;line-height:1.04rem;
  cursor:pointer;transition:all 0.2s ease-in-out;
}
.password-btn a:hover{filter:brightness(1.1);box-shadow:0 0.02rem 0.1rem #afc1d6;}
.password-btn a.password-btn-lock{background-position:0 0;}
.password-btn a.password-btn-cancel{background-position:-3.48rem 0;color:#436b9b;}

/* ============ Unlocked Modal ============ */
.unlocked-close{
  position:absolute;width:100%;height:100%;top:0;left:0;cursor:pointer;
}
.unlocked-box{padding:1.3rem 0;width:11.98rem;}
.unlocked-suo{
  background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/suo.png) no-repeat 50% 0;
  background-size:100% auto;width:0.87rem;height:1.2rem;margin:0 auto;display:block;
}

<body>

<img src="https://game.gtimg.cn/images/dfm/cp/havvkrelink/logo2.png" class="hide" alt="">

<!-- ============ 登录页 ============ -->
<div class="admin-overlay" id="adminOverlay" style="display:block;">
  <div class="login-box">
    <div class="login-logo"></div>
    <p class="login-txt"><i></i><span>请输入管理员凭证以继续</span><i></i></p>
    <div class="form-group">
      <label>用户名 / Username</label>
      <input type="text" id="username" placeholder="输入用户名..." maxlength="20" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码 / Password</label>
      <input type="password" id="password" placeholder="输入密码..." maxlength="20" autocomplete="off">
    </div>
    <a href="javascript:;" class="login-btn" id="login">连 接<span>Connection</span></a>
    <div class="login-error">⚠ <span class="admin-login-err">用户名或密码错误，请重新输入</span></div>
  </div>
</div>

<!-- ============ 主界面 ============ -->
<div class="folder-box" id="folderOverlay">
  <!-- 目录页 -->
  <div class="folder-content" id="folder-content">
    <div class="folder-title">
      <h2 class="folder-tit" id="nav-title">研究数据</h2>
      <a href="javascript:;" class="folder-new" id="btnNewFolder">新建目录</a>
      <a href="javascript:;" class="folder-logout">退出 / LOGOUT</a>
    </div>
    <div class="folder-ct" id="folder-ct"></div>
  </div>

  <!-- 文档列表页 -->
  <div class="doc-content" style="display:none;" id="doc-list">
    <div class="doc-title">
      <h2 class="doc-tit"><span id="doc-list-title"></span></h2>
      <a href="javascript:;" class="doc-new" id="btnNewDoc">新建文档</a>
      <a href="javascript:;" class="doc-edit-btn" id="doc-list-edit" style="display:none;">编辑</a>
      <a href="javascript:;" class="doc-back" id="doc-list-back">返回</a>
    </div>
    <div class="doc-ct" id="doc-list-content"></div>
  </div>

  <!-- 文档详情页 -->
  <div class="doc-content" style="display:none;" id="doc-detail">
    <div class="doc-title">
      <h2 class="doc-tit"><span id="doc-detail-title"></span></h2>
      <a href="javascript:;" class="doc-edit-btn" id="doc-detail-edit">编辑</a>
      <a href="javascript:;" class="doc-back" id="doc-detail-back">返回</a>
    </div>
    <div class="doc-text" id="doc-detail-content"></div>
  </div>
</div>

<!-- ============ 图片查看器 ============ -->
<div class="doc-picbox" id="doc-picbox">
  <div class="doc-picct">
    <a href="javascript:;" class="doc-close"></a>
    <a href="javascript:;" class="btn-down"></a>
    <p class="pic-name"><i></i><span></span></p>
    <img alt="">
  </div>
</div>

<!-- ============ 密码弹窗 ============ -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-box">
    <p class="password-suo"></p>
    <p class="password-tit">ACCESS RESTRICTED</p>
    <p class="password-desc" id="pass-title">α原型脑机</p>
    <p class="login-txt"><i></i><span>请输入访问密钥以解锁</span><i></i></p>
    <div class="form-group">
      <input type="password" id="password1" placeholder="输入密钥..." maxlength="20" autocomplete="off">
    </div>
    <div class="password-btn">
      <a href="javascript:;" class="password-btn-lock">解锁/UNLOCK</a>
      <a href="javascript:;" class="password-btn-cancel">取消/CANCEL</a>
    </div>
    <div class="login-error">⚠ <span class="pwd-err">密码错误，请重新输入</span></div>
  </div>
</div>

<!-- ============ 未解锁弹窗 ============ -->
<div class="unlocked-overlay" id="unlockedOverlay">
  <a href="javascript:;" class="unlocked-close"></a>
  <div class="unlocked-box">
    <p class="unlocked-suo"></p>
    <p class="unlocked-tit">Locked</p>
    <p class="unlocked-desc">未解锁</p>
  </div>
</div>

<!-- ============ 通用弹窗 ============ -->
<div class="new-overlay" id="newOverlay">
  <div class="new-box">
    <p class="new-title" id="newTitle">新建目录</p>
    <p class="new-msg" id="newMsg" style="display:none;"></p>
    <div class="form-group" id="newFormGroup">
      <label id="newLabel">目录名称</label>
      <input type="text" id="newInput" placeholder="请输入名称..." maxlength="50">
    </div>
    <div class="new-btns">
      <a href="javascript:;" class="login-btn" id="newConfirm">确 定</a>
      <a href="javascript:;" class="new-cancel" id="newCancel">取消</a>
    </div>
  </div>
</div>

<!-- ============ 悬浮编辑栏（格式+加密+保存） ============ -->
<div class="edit-savebar" id="editSavebar">
  <div class="es-left">
    <button data-fmt="bold" onmousedown="event.preventDefault()"><b>B</b></button>
    <button data-fmt="italic" onmousedown="event.preventDefault()"><i>I</i></button>
    <span class="es-sep"></span>
    <button data-fmt="formatBlock" data-fmt-arg="h2" onmousedown="event.preventDefault()">H2</button>
    <button data-fmt="formatBlock" data-fmt-arg="h3" onmousedown="event.preventDefault()">H3</button>
    <button data-fmt="formatBlock" data-fmt-arg="p" onmousedown="event.preventDefault()">P</button>
    <span class="es-sep"></span>
    <button data-fmt="insertUnorderedList" onmousedown="event.preventDefault()">列表</button>
    <button data-fmt="insertTable" onmousedown="event.preventDefault()">表格</button>
  </div>
  <div class="es-center">
    <label class="lock-toggle">
      <input type="checkbox" id="editLock" onchange="toggleLockPassword()">
      <span class="lock-label">加密</span>
    </label>
    <input type="password" class="lock-password" id="editLockPwd" placeholder="密钥..." style="visibility:hidden;">
  </div>
  <div class="es-right">
    <button class="btn-cancel" onclick="exitEditMode()">取消</button>
    <button class="btn-save" id="btnEditSave" onclick="saveDocument()">保存</button>
  </div>
</div>

<div class="copy-toast" id="copyToast"></div>

<script>
(function(){
  'use strict';

    // ==================== 从 data.json 加载数据 ====================
  var FOLDER_ICON = 'https://game.gtimg.cn/images/dfm/cp/havvkrelink/folder1.png';
  var FOLDER_ICON_LOCKED = 'https://game.gtimg.cn/images/dfm/cp/havvkrelink/folder2.png';
  var mockData = { folders: [], documents: {} };

  function loadData() {
    return fetch('./data.json')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        mockData = data;
        FOLDER_ICON = data.folderIcon || FOLDER_ICON;
        FOLDER_ICON_LOCKED = data.folderIconLocked || FOLDER_ICON_LOCKED;
        console.log('数据加载完成');
        return data;
      })
      .catch(function(err) {
        console.error('数据加载失败:', err);
      });
  }

  // ==================== 状态管理 ====================
  var state = {
    loginUser: '',
    loginPass: '',
    currentFolderId: '',
    currentFolderPassword: '',
    currentDocId: '',
    currentDocPassword: '',
    passwordTarget: '',   // 'folder' | 'doc'
    passwordTargetId: '',
    passwordTargetName: ''
  };

  // ==================== DOM 引用 ====================
  var $ = function(s){ return document.querySelector(s); };
  var $$ = function(s){ return document.querySelectorAll(s); };

  var dom = {
    adminOverlay: $('#adminOverlay'),
    folderOverlay: $('#folderOverlay'),
    folderContent: $('#folder-content'),
    folderCt: $('#folder-ct'),
    docList: $('#doc-list'),
    docListTitle: $('#doc-list-title'),
    docListContent: $('#doc-list-content'),
    docDetail: $('#doc-detail'),
    docDetailTitle: $('#doc-detail-title'),
    docDetailContent: $('#doc-detail-content'),
    docPicbox: $('#doc-picbox'),
    passwordOverlay: $('#passwordOverlay'),
    password1: $('#password1'),
    passTitle: $('#pass-title'),
    unlockedOverlay: $('#unlockedOverlay'),
    loginError: $('#adminOverlay .login-error'),
    pwdError: $('#passwordOverlay .login-error'),
    adminLoginErr: $('.admin-login-err'),
    pwdErr: $('.pwd-err'),
    loginBtn: $('#login'),
    username: $('#username'),
    password: $('#password'),
    picImg: $('#doc-picbox img'),
    picName: $('#doc-picbox .pic-name span')
  };

  // ==================== 页面切换 ====================
  function showPage(page) {
    if (page === 'login') {
      if (editState.active) exitEditMode();
      dom.adminOverlay.style.display = 'block';
      dom.folderOverlay.style.display = 'none';
    } else {
      dom.adminOverlay.style.display = 'none';
      dom.folderOverlay.style.display = 'block';
      dom.folderContent.style.display = (page === 'folder') ? 'block' : 'none';
      dom.docList.style.display = (page === 'doc_list') ? 'block' : 'none';
      dom.docDetail.style.display = (page === 'doc_detail') ? 'block' : 'none';
      // Show/hide edit button only on doc_detail
      $('#doc-detail-edit').style.display = (page === 'doc_detail') ? 'block' : 'none';
      if (page !== 'doc_detail' && editState.active) exitEditMode();
    }
  }

  // ==================== 错误处理 ====================
  function showPasswordError() {
    dom.pwdError.style.display = 'block';
    dom.password1.disabled = true;
    $('.password-btn-lock').style.pointerEvents = 'none';
    var countDown = 5;
    dom.pwdErr.textContent = '密码错误，' + countDown + '秒后可重新输入';
    var timer = setInterval(function(){
      countDown--;
      if (countDown > 0) {
        dom.pwdErr.textContent = '密码错误，' + countDown + '秒后可重新输入';
      } else {
        clearInterval(timer);
        dom.pwdError.style.display = 'none';
        dom.password1.disabled = false;
        dom.password1.value = '';
        $('.password-btn-lock').style.pointerEvents = 'auto';
      }
    }, 1000);
  }

  function showLoginError(msg) {
    if (msg) { dom.adminLoginErr.textContent = msg; }
    else { dom.adminLoginErr.textContent = '用户名或密码错误，请重新输入'; }
    dom.loginError.style.display = 'block';
    dom.loginBtn.style.pointerEvents = 'none';
    setTimeout(function(){
      dom.loginError.style.display = 'none';
      dom.loginBtn.style.pointerEvents = 'auto';
    }, 5000);
  }

  // ==================== 渲染函数 ====================
  function renderFolders() {
    var html = '';
    mockData.folders.forEach(function(item, idx){
      var lockedClass = item.locked ? 'folder-suo' : '';
      var lockedContent = item.locked
        ? '<p class="suo-txt1"><i></i><span>加密·需要访问密钥</span></p><p class="suo-txt2"><i></i><span>ENCRYPTED</span></p>'
        : '';
      var lockIcon = item.locked ? '🔓' : '🔒';
      html += '<a href="javascript:;" data-folder="' + item.id + '" data-name="' + item.name + '" data-locked="' + (item.locked ? '1' : '0') + '" data-password="' + (item.password || '') + '" class="' + lockedClass + '" style="position:relative;">'
        + '<img src="' + item.icon + '" alt="">'
        + '<p class="folder-name">' + item.name + '</p>'
        + lockedContent
        + '<div class="folder-actions">'
        + '<button class="folder-btn lock-btn" data-action="lock" data-idx="' + idx + '" title="切换加密">' + lockIcon + '</button>'
        + '<button class="folder-btn del" data-action="delfolder" data-idx="' + idx + '" title="删除">✕</button>'
        + '</div>'
        + '</a>';
    });
    dom.folderCt.innerHTML = html;
  }

  function renderDocuments(folderId) {
    var list = mockData.documents[folderId] || [];
    var html = '';
    list.forEach(function(item){
      var docClass = item.locked ? 'doc-suo' : (item.type === 'image' ? 'doc-pic' : '');
      var docContent = '';
      if (item.type === 'image') {
        if (item.locked) {
          docContent = '<i></i><p class="doc-name">' + item.name + '</p>';
        } else {
          docContent = '<img src="' + item.src + '" alt=""><p class="doc-name">' + item.name + '</p>';
        }
      } else {
        docContent = '<i></i><p class="doc-name">' + item.name + '</p>';
      }
      html += '<a href="javascript:;" data-doc="' + item.id + '" data-name="' + item.name + '" data-locked="' + (item.locked ? '1' : '0') + '" data-password="' + (item.password || '') + '" data-type="' + (item.type || '') + '" data-src="' + (item.src || '') + '" class="' + docClass + '">' + docContent + '</a>';
    });
    dom.docListContent.innerHTML = html;
  }

  // ==================== 数据加载（模拟） ====================
  function loadFolders() {
    renderFolders();
    showPage('folder');
  }

  function loadDocuments(folderId) {
    state.currentFolderId = folderId;
    var folder = mockData.folders.find(function(f){ return f.id === folderId; });
    dom.docListTitle.textContent = folder ? folder.name : '';
    renderDocuments(folderId);
    showPage('doc_list');
    dom.passwordOverlay.style.display = 'none';
    dom.password1.value = '';
    dom.pwdError.style.display = 'none';
  }

  function loadDocumentDetail(docId) {
    state.currentDocId = docId;
    // search all document arrays for the doc
    var doc = null;
    for (var folderId in mockData.documents) {
      var found = mockData.documents[folderId].find(function(d){ return d.id === docId; });
      if (found) { doc = found; break; }
    }
    if (doc) {
      dom.docDetailTitle.textContent = doc.name;
      dom.docDetailContent.innerHTML = doc.content || '';
      showPage('doc_detail');
    }
  }

  function verifyDocumentPassword(docId, password) {
    // search for doc
    var doc = null;
    for (var folderId in mockData.documents) {
      var found = mockData.documents[folderId].find(function(d){ return d.id === docId; });
      if (found) { doc = found; break; }
    }
    if (doc && doc.password === password) {
      return { code: 0, data: doc.src || '' };
    }
    return { code: 403, msg: '密码错误' };
  }

  // ==================== 事件绑定 ====================
  // 登录
  dom.loginBtn.addEventListener('click', function(){
    var username = dom.username.value;
    var password = dom.password.value;

    if (username === mockData.login.username && password === mockData.login.password) {
      state.loginUser = username;
      state.loginPass = password;
      loadFolders();
    } else {
      showLoginError('');
    }
  });

  // 回车登录
  dom.password.addEventListener('keydown', function(e){
    if (e.key === 'Enter') { dom.loginBtn.click(); }
  });

  // 退出
  $('.folder-logout').addEventListener('click', function(){
    state.loginUser = '';
    state.loginPass = '';
    state.currentFolderId = '';
    state.currentFolderPassword = '';
    state.currentDocId = '';
    state.currentDocPassword = '';
    dom.username.value = '';
    dom.password.value = '';
    showPage('login');
  });

  // 点击目录（事件委托）
  dom.folderCt.addEventListener('click', function(e){
    // Handle action buttons first
    var btn = e.target.closest('.folder-btn');
    if (btn) {
      e.stopPropagation();
      e.preventDefault();
      var action = btn.getAttribute('data-action');
      var idx = parseInt(btn.getAttribute('data-idx'));
      if (action === 'delfolder') {
        var folder = mockData.folders[idx];
        showConfirm('删除目录', '确定删除 "' + folder.name + '" 及其中所有文档？此操作不可恢复。', function(ok){
          if (!ok) return;
          var fid = folder.id;
          mockData.folders.splice(idx, 1);
          if (mockData.documents && mockData.documents[fid]) delete mockData.documents[fid];
          doSaveData('删除目录: ' + folder.name, function(){ renderFolders(); });
        });
        return;
      }
      if (action === 'lock') {
        var folder = mockData.folders[idx];
        if (folder.locked) {
          folder.locked = false;
          folder.password = '';
          folder.icon = FOLDER_ICON;
          doSaveData('解锁目录: ' + folder.name, function(){ renderFolders(); });
        } else {
          showNewModal('设置密钥', '访问密钥', function(pwd){
            if (!pwd || !pwd.trim()) return;
            folder.locked = true;
            folder.password = pwd.trim();
            folder.icon = FOLDER_ICON_LOCKED;
            doSaveData('加密目录: ' + folder.name, function(){ renderFolders(); });
          });
        }
        return;
      }
    }
    // Normal folder click
    var a = e.target.closest('a');
    if (!a) return;
    var a = e.target.closest('a');
    if (!a) return;
    var folderId = a.getAttribute('data-folder');
    var folderName = a.getAttribute('data-name');
    var isLocked = a.getAttribute('data-locked') === '1';

    if (isLocked) {
      state.passwordTarget = 'folder';
      state.passwordTargetId = folderId;
      state.passwordTargetName = folderName;
      dom.passTitle.textContent = folderName;
      dom.passwordOverlay.style.display = 'block';
    } else {
      state.currentFolderPassword = '';
      loadDocuments(folderId);
    }
  });

  // 点击文档（事件委托）
  dom.docListContent.addEventListener('click', function(e){
    var a = e.target.closest('a');
    if (!a) return;
    var docId = a.getAttribute('data-doc');
    var docName = a.getAttribute('data-name');
    var isLocked = a.getAttribute('data-locked') === '1';
    var docType = a.getAttribute('data-type') || '';

    if (isLocked) {
      state.passwordTarget = 'doc';
      state.passwordTargetId = docId;
      state.passwordTargetName = docName;
      dom.passTitle.textContent = docName;
      dom.passwordOverlay.style.display = 'block';
    } else if (docType === 'image') {
      var src = a.getAttribute('data-src');
      if (src) {
        dom.picImg.src = src;
        var pureSrc = src.split('?')[0].split('#')[0];
        var suffix = pureSrc.split('.').pop();
        dom.picName.textContent = docName + '.' + suffix;
        dom.docPicbox.style.display = 'block';
      }

      state.currentDocPassword = '';
      loadDocumentDetail(docId);

  // 列表页返回
  $('#doc-list-back').addEventListener('click', function(){
    renderFolders();
    showPage('folder');
    state.currentFolderId = '';
    state.currentFolderPassword = '';
  });

  // 详情页返回
  $('#doc-detail-back').addEventListener('click', function(){
    renderDocuments(state.currentFolderId);
    showPage('doc_list');
    state.currentDocId = '';
    state.currentDocPassword = '';
  });

  // 点击代码复制到剪贴板（事件委托）
  var copyToast = document.getElementById('copyToast');
  var toastTimer = null;
  function showToast(msg){
    clearTimeout(toastTimer);
    copyToast.textContent = msg;
    copyToast;
    toastTimer = setTimeout(function(){ copyToast; }, 1200);
  }
  dom.docDetailContent.addEventListener('click', function(e){
    var td = e.target.closest('.copy-code');
    if (!td) return;
    var code = td.textContent.trim();
    if (!code) return;
    navigator.clipboard.writeText(code).then(function(){
      td.classList.add('copied');
      setTimeout(function(){ td.classList.remove('copied'); }, 800);
      showToast('已复制');
    }).catch(function(){
      // 降级方案
      var ta = document.createElement('textarea');
      ta.value = code;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      td.classList.add('copied');
      setTimeout(function(){ td.classList.remove('copied'); }, 800);
      showToast('已复制');
    });
  });

  // 密码弹窗解锁
  $('.password-btn-lock').addEventListener('click', function(){
    var pwd = dom.password1.value;
    if (!pwd || pwd.trim() === '') return;

    if (state.passwordTarget === 'folder') {
      // 查找文件夹密码
      var folder = mockData.folders.find(function(f){ return f.id === state.passwordTargetId; });
      if (folder && folder.password === pwd) {
        state.currentFolderPassword = pwd;
        loadDocuments(state.passwordTargetId);
      } else {
        // 显示短暂的密码错误提示
        dom.pwdErr.textContent = '密码错误，请重新输入';
        dom.pwdError.style.display = 'block';
        dom.password1.disabled = true;
        $('.password-btn-lock').style.pointerEvents = 'none';
        setTimeout(function(){
          dom.pwdError.style.display = 'none';
          dom.password1.disabled = false;
          dom.password1.value = '';
          $('.password-btn-lock').style.pointerEvents = 'auto';
        }, 3000);
        state.currentFolderPassword = '';
      }
    } else if (state.passwordTarget === 'doc') {
      var res = verifyDocumentPassword(state.passwordTargetId, pwd);
      if (res.code === 0) {
        dom.passwordOverlay.style.display = 'none';
        dom.password1.value = '';
        dom.pwdError.style.display = 'none';

        var docA = dom.docListContent.querySelector('a[data-doc="' + state.passwordTargetId + '"]');
        if (docA) {
          var docType = docA.getAttribute('data-type') || '';
          if (docType === 'image') {
            var src = res.data;
            if (src) {
              dom.picImg.src = src;
              var pureSrc = src.split('?')[0].split('#')[0];
              var suffix = pureSrc.split('.').pop();
              dom.picName.textContent = docA.getAttribute('data-name') + '.' + suffix;
              dom.docPicbox.style.display = 'block';
            }
          } else {
            state.currentDocPassword = pwd;
            loadDocumentDetail(state.passwordTargetId);
          }
        }
      } else {
        showPasswordError();
      }
    }
  });

  // 密码输入框回车
  dom.password1.addEventListener('keydown', function(e){
    if (e.key === 'Enter') { $('.password-btn-lock').click(); }
  });

  // 密码弹窗取消
  $('.password-btn-cancel').addEventListener('click', function(){
    dom.passwordOverlay.style.display = 'none';
    dom.password1.value = '';
    dom.pwdError.style.display = 'none';
    state.passwordTarget = '';
    state.passwordTargetId = '';
  });

  // 图片弹窗关闭
  $('#doc-picbox .doc-close').addEventListener('click', function(){
    dom.docPicbox.style.display = 'none';
  });

  // 图片下载
  $('#doc-picbox .btn-down').addEventListener('click', function(){
    var src = dom.picImg.src;
    if (!src) return;
    fetch(src, { mode: 'cors' })
      .then(function(res){ return res.blob(); })
      .then(function(blob){
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = dom.picName.textContent || 'image';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      })
      .catch(function(){
        showCopyToast('图片下载失败，请长按图片另存为');
      });
  });

  // 未解锁弹窗关闭
  $('.unlocked-close').addEventListener('click', function(){
    dom.unlockedOverlay.style.display = 'none';
  });

  // ==================== 悬浮编辑 ====================
  var editState = {
    active: false,
    editingDocId: '',
    editingDocName: ''
  };

  // Edit button click
  $('#doc-detail-edit').addEventListener('click', function(){
    if (editState.active) {
      exitEditMode();
    } else {
      enterEditMode();
    }
  });

  function findCurrentDoc(){
    for (var folderId in mockData.documents) {
      var found = mockData.documents[folderId].find(function(d){ return d.id === state.currentDocId; });
      if (found) return found;
    }
    return null;
  }

  function enterEditMode(){
    editState.active = true;
    editState.editingDocId = state.currentDocId;
    editState.editingDocName = dom.docDetailTitle.textContent;
    $('#editSavebar').classList.add('show');
    dom.docDetailContent.setAttribute('contenteditable', 'true');
    document.execCommand('defaultParagraphSeparator', false, 'p');
    dom.docDetailContent.classList.add('editing');
    dom.docDetailContent.addEventListener('keydown', handleEditKeydown);
    // Pre-fill lock state
    var doc = findCurrentDoc();
    if (doc) {
      $('#editLock').checked = doc.locked || false;
      $('#editLockPwd').value = doc.password || '';
      $('#editLockPwd').style.visibility = doc.locked ? 'visible' : 'hidden';
    }
    $('#doc-detail-edit').textContent = '退出编辑';
    $('#doc-detail-edit').classList.add('active');
  }

  function handleEditKeydown(e){
    if (e.key === 'Enter') {
      e.preventDefault();
      document.execCommand('insertParagraph', false, null);
    }
  }

  function exitEditMode(){
    editState.active = false;
    $('#editSavebar').classList.remove('show');
    dom.docDetailContent.removeAttribute('contenteditable');
    dom.docDetailContent.removeEventListener('keydown', handleEditKeydown);
    dom.docDetailContent.classList.remove('editing');
    $('#doc-detail-edit').textContent = '编辑';
    $('#doc-detail-edit').classList.remove('active');
    // Restore original content
    loadDocumentDetail(editState.editingDocId);
  }

  // Format toolbar event delegation (mousedown to capture selection before it clears)
  $('#editSavebar').addEventListener('mousedown', function(e){
    var btn = e.target.closest('[data-fmt]');
    if (!btn) return;
    var cmd = btn.getAttribute('data-fmt');
    var arg = btn.getAttribute('data-fmt-arg') || null;
    dom.docDetailContent.focus();
    if (cmd === 'insertTable') {
      insertTable();
    } else if (cmd === 'formatBlock') {
      var sel = window.getSelection();
      if (sel.rangeCount === 0) { document.execCommand(cmd, false, arg); return; }
      var range = sel.getRangeAt(0);
      var node = range.commonAncestorContainer;
      var el = node.nodeType === 3 ? node.parentElement : node;
      var ed = dom.docDetailContent;
      // Find the nearest heading ancestor
      var curHeading = el.closest('h1,h2,h3,h4,h5,h6');
      curHeading = curHeading && curHeading.closest('#doc-detail-content') ? curHeading : null;

      function replaceWith(el, tag) {
        var n = document.createElement(tag);
        while (el.firstChild) { n.appendChild(el.firstChild); }
        var icons = n.querySelectorAll('i');
        for (var i = 0; i < icons.length; i++) { icons[i].remove(); }
        el.parentNode.replaceChild(n, el);
        ed.focus();
      }
      if (arg === 'p') {
        if (curHeading) { replaceWith(curHeading, 'p'); }
        else { document.execCommand(cmd, false, arg); }
      } else {
        if (curHeading && curHeading.tagName.toLowerCase() === arg) {
          replaceWith(curHeading, 'p');
        } else if (curHeading) {
          replaceWith(curHeading, arg);
        } else {
          document.execCommand(cmd, false, arg);
        }
      }
    } else {
      document.execCommand(cmd, false, arg);
    }
  });

  function insertTable(){
    var sel = window.getSelection();
    if (sel.rangeCount > 0) {
      var range = sel.getRangeAt(0);
      var node = range.commonAncestorContainer;
      var el = node.nodeType === 3 ? node.parentElement : node;
      var p = el.closest('p');
      var isEmptyP = p && p.textContent.trim() === '' && range.collapsed && range.startOffset === 0;
      if (!isEmptyP) {
        document.execCommand('insertParagraph', false, null);
      }
    }
    showNewModal('插入表格', '行数（不含表头）', function(rows){
      rows = parseInt(rows) || 3;
      showNewModal('插入表格', '列数', function(cols){
        cols = parseInt(cols) || 2;
        var html = '<table class=\"doc-table\"><tr>';
        for (var c = 0; c < cols; c++) html += '<th>表头' + (c+1) + '</th>';
        html += '</tr>';
        for (var r = 0; r < rows; r++) {
          html += '<tr>';
          for (var c = 0; c < cols; c++) html += '<td>内容</td>';
          html += '</tr>';
        }
        html += '</table><p>&#8203;</p>';
        document.execCommand('insertHTML', false, html);
      });
    });
  }

  // Save document to GitHub
  function saveDocument(){
    var token = localStorage.getItem('gh_token');
    if (!token) {
      promptToken();
      return;
    }
    doSave(token);
  }

  function doSave(token){
    var btn = $('#btnEditSave');
    btn.disabled = true;
    btn.textContent = '保存中...';

    var newContent = dom.docDetailContent.innerHTML;
    var docId = editState.editingDocId;

    // Update mockData
    var locked = $('#editLock').checked;
    var pwd = $('#editLockPwd').value;
    if (locked && !pwd.trim()) { showCopyToast('请先输入访问密钥'); btn.disabled = false; btn.textContent = '保存到 GitHub'; return; }
    for (var folderId in mockData.documents) {
      var found = mockData.documents[folderId].find(function(d){ return d.id === docId; });
      if (found) {
        found.content = newContent;
        found.locked = locked;
        found.password = locked ? pwd : '';
        break;
      }
    }

    // Save data.json to GitHub
    var body = JSON.stringify(mockData, null, 2);
    // Get SHA first
    fetch('https://api.github.com/repos/xiaogan03/hafukec/contents/data.json?ref=master', {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      // Encode content
      var bytes = new TextEncoder().encode(body);
      var bin = '';
      for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      var base64 = btoa(bin);

      return fetch('https://api.github.com/repos/xiaogan03/hafukec/contents/data.json', {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: '更新 ' + editState.editingDocName + ' [悬浮编辑]',
          content: base64,
          sha: res.sha,
          branch: 'master'
        })
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(){
      btn.disabled = false;
      btn.textContent = '保存到 GitHub';
      showCopyToast('保存成功！返回即可查看更新');
      exitEditMode();
      // Refresh views from in-memory data (already updated)
      renderFolders();
      renderDocuments(state.currentFolderId);
      loadDocumentDetail(docId);
      showPage('doc_detail');
    })
    .catch(function(err){
      btn.disabled = false;
      btn.textContent = '保存到 GitHub';
      showCopyToast('保存失败: ' + err.message);
      if (err.message.indexOf('401') >= 0) {
        localStorage.removeItem('gh_token');
        promptToken();
      }
    });
  }

  function promptToken(){
    showNewModal('GitHub Token', 'Personal Access Token（需勾选 repo 权限）', function(tok){
      if (tok && tok.trim()) {
        localStorage.setItem('gh_token', tok.trim());
        showCopyToast('Token 已保存');
        doSave(tok.trim());
      }
    });
  }

  function showCopyToast(msg){
    var toast = $('#copyToast');
    toast.textContent = msg;
    toast;
    setTimeout(function(){ toast; }, 2000);
  }

  window.toggleLockPassword = function(){
    var checked = $('#editLock').checked;
    $('#editLockPwd').style.visibility = checked ? 'visible' : 'hidden';
  };
  window.exitEditMode = exitEditMode;
  window.saveDocument = saveDocument;

  // ==================== 新建目录/文档 ====================
  var newCallback = null;
  var newMode = 'input'; // 'input' | 'confirm'

  function showNewModal(title, label, cb){
    newMode = 'input';
    newCallback = cb;
    $('#newTitle').textContent = title;
    $('#newMsg').style.display = 'none';
    $('#newFormGroup').style.display = 'block';
    $('#newLabel').textContent = label;
    $('#newInput').value = '';
    $('#newOverlay').classList.add('show');
    setTimeout(function(){ $('#newInput').focus(); }, 100);
  }

  function showConfirm(title, msg, cb){
    newMode = 'confirm';
    newCallback = cb;
    $('#newTitle').textContent = title;
    $('#newFormGroup').style.display = 'none';
    $('#newMsg').textContent = msg;
    $('#newMsg').style.display = 'block';
    $('#newOverlay').classList.add('show');
  }

  function hideNewModal(){
    $('#newOverlay').classList.remove('show');
    newCallback = null;
  }

  document.addEventListener('click', function(e){
    if (e.target.id === 'newConfirm' || (e.target.closest && e.target.closest('#newConfirm'))) {
      var cb = newCallback;
      if (newMode === 'confirm') {
        hideNewModal();
        if (cb) cb(true);
      } else {
        var name = $('#newInput').value.trim();
        if (!name) return;
        hideNewModal();
        if (cb) cb(name);
      }
    }
    if (e.target.id === 'newCancel' || (e.target.closest && e.target.closest('#newCancel'))) {
      var cb2 = newCallback;
      if (newMode === 'confirm' && cb2) cb2(false);
      hideNewModal();
    }
  });

  $('#newCancel').addEventListener('click', hideNewModal);

  $('#newInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') $('#newConfirm').click();
  });

  $('#btnNewFolder').addEventListener('click', function(){
    showNewModal('新建目录', '目录名称', function(name){
      var id = 'folder_' + Date.now();
      mockData.folders.push({ id: id, name: name, icon: FOLDER_ICON, locked: false, password: '' });
      if (!mockData.documents) mockData.documents = {};
      mockData.documents[id] = [];
      doSaveData('创建目录: ' + name, function(){
        renderFolders();
        showPage('folder');
      });
    });
  });

  $('#btnNewDoc').addEventListener('click', function(){
    if (!state.currentFolderId) { showCopyToast('请先选择一个目录'); return; }
    showNewModal('新建文档', '文档名称', function(name){
      var id = 'doc_' + Date.now();
      if (!mockData.documents[state.currentFolderId]) mockData.documents[state.currentFolderId] = [];
      mockData.documents[state.currentFolderId].push({
        id: id, name: name, type: 'text', locked: false, password: '', src: '',
        content: '<h2>' + name + '</h2><p></p>'
      });
      doSaveData('创建文档: ' + name, function(){
        loadDocuments(state.currentFolderId);
      });
    });
  });

  // Reusable GitHub save function
  function doSaveData(msg, callback){
    var token = localStorage.getItem('gh_token');
    if (!token) {
      showNewModal('GitHub Token', 'Personal Access Token', function(t){
        if (t) { localStorage.setItem('gh_token', t); doSaveData(msg, callback); }
      });
      return;
    }

    var body = JSON.stringify(mockData, null, 2);
    var btn = $('#btnEditSave');

    fetch('https://api.github.com/repos/xiaogan03/hafukec/contents/data.json?ref=master', {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      var bytes = new TextEncoder().encode(body);
      var bin = '';
      for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return fetch('https://api.github.com/repos/xiaogan03/hafukec/contents/data.json', {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: msg, content: btoa(bin), sha: res.sha, branch: 'master' })
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(){
      if (btn) { btn.disabled = false; btn.textContent = '保存到 GitHub'; }
      showCopyToast('保存成功！');
      if (callback) callback();
    })
    .catch(function(err){
      if (btn) { btn.disabled = false; btn.textContent = '保存到 GitHub'; }
      showCopyToast('保存失败: ' + err.message);
    });
  }

  // ==================== 初始化 ====================
  loadData().then(function() {
    dom.adminOverlay.style.display = 'block';
    dom.folderOverlay.style.display = 'none';
    dom.passwordOverlay.style.display = 'none';

    console.log('信息予你无限 · 管理后台 · 静态演示版');
    console.log('预设账号: ' + mockData.login.username + ' / ' + mockData.login.password);
    console.log('加密文件夹密码(人员伤亡事故调查): 123');
  });
})();
