<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>内容编辑器 — 信息予你无限</title>
<style>
/* ============ Reset ============ */
body,div,dl,dt,dd,ul,ol,li,h1,h2,h3,h4,h5,h6,pre,form,fieldset,input,textarea,p,blockquote,th,td{margin:0;padding:0;}
table{border-collapse:collapse;border-spacing:0;}
ol,ul{list-style:none;}
a{text-decoration:none;color:#2362af;}
*{box-sizing:border-box;}

/* ============ Base ============ */
html,body{min-width:12rem;font-size:calc(100 / 3840 * 100vw);}
body{font:0.2rem/1.5 'fzlth','simhei','Microsoft YaHei',sans-serif;background:#ecf3fa;color:#494949;overflow-x:hidden;}

@font-face{font-family:'fzlth';src:url('./字体/fzlth.woff') format('truetype');}
@font-face{font-family:'fzltzh';src:url('./字体/fzltzh.woff') format('truetype');}
@font-face{font-family:'fzltth';src:url('./字体/fzltth.woff') format('truetype');}

/* ============ Top Bar (matching main site title area) ============ */
.top-bar{position:relative;width:100%;height:2rem;background:url(https://game.gtimg.cn/images/dfm/cp/havvkrelink/rp4.jpg) no-repeat 50% 0 fixed;background-size:100% auto;display:flex;justify-content:space-between;align-items:center;padding:0 0.4rem;z-index:10;}
.top-bar-title{font-size:0.5rem;color:#403f3f;font-family:'fzltth';display:flex;align-items:center;gap:0.2rem;}
.top-bar-title span{color:#5894de;}
.top-bar-right{display:flex;align-items:center;gap:0.24rem;}
.top-bar-right a{color:#5894de;font-size:0.26rem;font-family:'fzltzh';cursor:pointer;transition:all 0.15s;}
.top-bar-right a:hover{color:#2362af;}
.token-badge{font-size:0.2rem;padding:0.04rem 0.16rem;border-radius:0.06rem;font-family:'fzltzh';}
.token-badge.ok{background:rgba(27,94,32,0.12);color:#1b5e20;}
.token-badge.none{background:rgba(35,98,175,0.1);color:#2362af;}

/* ============ Toolbar (below top bar) ============ */
.toolbar{background:#fff;box-shadow:0 0.04rem 0.16rem rgba(175,193,214,0.25);padding:0.18rem 0.4rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.16rem;position:sticky;top:0;z-index:5;}
.toolbar-section{display:flex;gap:0.14rem;align-items:center;font-size:0.2rem;color:#6d7888;font-family:'fzltzh';}
.toolbar select{padding:0.1rem 0.24rem;border-radius:0.08rem;font-size:0.2rem;border:1px solid #d0d0d0;background:#fff;color:#494949;font-family:'fzltzh';min-width:3rem;height:0.7rem;}
.toolbar button{padding:0.1rem 0.28rem;border-radius:0.08rem;font-size:0.2rem;border:1px solid #c5daec;background:#fff;color:#2362af;font-family:'fzltzh';cursor:pointer;transition:all 0.15s;height:0.7rem;}
.toolbar button:hover{background:#e8f4ff;border-color:#5894de;}
.toolbar button.primary{background:#2362af;color:#fff;border-color:#2362af;}
.toolbar button.primary:hover{background:#1a4d8f;box-shadow:0 0.04rem 0.16rem rgba(35,98,175,0.3);}
.toolbar button.danger{color:#d32f2f;border-color:#fcc;}
.toolbar button.danger:hover{background:#fff5f5;}
.toolbar button:disabled{opacity:0.5;pointer-events:none;}

/* ============ Token Overlay ============ */
.token-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;justify-content:center;align-items:center;}
.token-box{width:7.92rem;padding:0.6rem 0.7rem 0.8rem;background:#ffffff;border-radius:0.2rem;box-shadow:0 0 0.5rem rgba(133,150,170,0.5);}
.token-box h2{font-size:0.4rem;color:#202020;text-align:center;font-family:'fzltzh';font-weight:normal;margin-bottom:0.24rem;}
.token-box .desc{font-size:0.22rem;color:#6d7888;line-height:1.8;margin-bottom:0.4rem;text-align:center;}
.token-box .desc a{color:#2362af;}
.token-box .desc .warn{color:#d32f2f;display:block;margin-top:0.12rem;}
.token-box input{width:100%;padding:0.14rem 0.3rem;border:1px solid #d0d0d0;border-radius:0.1rem;font-size:0.24rem;font-family:monospace;margin-bottom:0.4rem;background:#efefef;color:#555;height:0.98rem;}
.token-box .btn-save{display:flex;justify-content:center;align-items:center;margin:0 auto;background:#2362af;color:#fff;width:4.11rem;height:0.95rem;border-radius:0.1rem;font-size:0.28rem;cursor:pointer;border:none;font-family:'fzltzh';transition:all 0.15s;}
.token-box .btn-save:hover{background:#1a4d8f;box-shadow:0 0.04rem 0.2rem rgba(35,98,175,0.3);}

/* ============ Main Layout ============ */
.main{max-width:17.74rem;margin:0.28rem auto;padding:0 0.24rem;display:flex;gap:0.24rem;}
@media(max-width:9rem){.main{flex-direction:column;}}

/* ============ Folder Panel ============ */
.folder-panel{width:4.4rem;flex-shrink:0;}
.folder-panel h3{font-size:0.24rem;color:#6d7888;margin-bottom:0.18rem;font-family:'fzltzh';font-weight:normal;text-transform:uppercase;letter-spacing:0.005rem;}
.folder-list{background:#fff;border-radius:0.12rem;overflow:hidden;box-shadow:0 0 0.2rem rgba(175,193,214,0.2);}
.folder-item{padding:0.24rem 0.3rem;border-bottom:1px solid #f2f5fa;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background 0.15s;}
.folder-item:hover{background:#f5f8ff;}
.folder-item.active{background:#e8f0fe;border-left:0.06rem solid #2362af;}
.folder-item .name{font-weight:normal;font-size:0.28rem;font-family:'fzltzh';color:#494949;}
.folder-item .meta{font-size:0.18rem;color:#9fb0cb;display:flex;gap:0.08rem;margin-top:0.04rem;font-family:'fzlth';}
.folder-item .meta span{padding:0.02rem 0.1rem;border-radius:0.04rem;background:#f0f4fa;}
.folder-item .meta span.locked{background:#fff3e0;color:#e65100;}
.folder-item .actions{display:flex;gap:0.08rem;opacity:0;transition:opacity 0.15s;}
.folder-item:hover .actions{opacity:1;}
.folder-item .actions button{font-size:0.18rem;padding:0.06rem 0.16rem;border:1px solid #d0d0d0;border-radius:0.06rem;background:#fff;color:#494949;cursor:pointer;font-family:'fzltzh';}
.folder-item .actions button.del{color:#d32f2f;border-color:#fcc;}

/* ============ Doc Panel ============ */
.doc-panel{flex:1;min-width:0;}
.doc-panel h3{font-size:0.24rem;color:#6d7888;margin-bottom:0.18rem;font-family:'fzltzh';font-weight:normal;text-transform:uppercase;letter-spacing:0.005rem;}
.doc-list{background:#fff;border-radius:0.12rem;box-shadow:0 0 0.2rem rgba(175,193,214,0.2);}
.doc-item{padding:0.24rem 0.3rem;border-bottom:1px solid #f2f5fa;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background 0.15s;}
.doc-item:hover{background:#f5f8ff;}
.doc-item.active{background:#e8f0fe;border-left:0.06rem solid #2362af;}
.doc-item .name{font-weight:normal;font-size:0.28rem;font-family:'fzltzh';color:#494949;}
.doc-item .meta{font-size:0.18rem;color:#9fb0cb;display:flex;gap:0.08rem;align-items:center;margin-top:0.04rem;font-family:'fzlth';}
.doc-item .meta span{padding:0.02rem 0.1rem;border-radius:0.04rem;background:#f0f4fa;}
.doc-item .meta span.locked{background:#fff3e0;color:#e65100;}
.doc-item .actions{display:flex;gap:0.08rem;opacity:0;transition:opacity 0.15s;}
.doc-item:hover .actions{opacity:1;}
.doc-item .actions button{font-size:0.18rem;padding:0.06rem 0.16rem;border:1px solid #d0d0d0;border-radius:0.06rem;background:#fff;color:#494949;cursor:pointer;font-family:'fzltzh';}
.doc-item .actions button.del{color:#d32f2f;border-color:#fcc;}

/* ============ Edit Form ============ */
.edit-form{background:#fff;border-radius:0.12rem;padding:0.4rem;margin-top:0.24rem;box-shadow:0 0 0.2rem rgba(175,193,214,0.2);}
.edit-form h3{font-size:0.32rem;margin-bottom:0.28rem;font-family:'fzltzh';font-weight:normal;color:#202020;}
.form-row{display:flex;gap:0.2rem;margin-bottom:0.24rem;flex-wrap:wrap;align-items:flex-start;}
.form-row label{width:1.5rem;line-height:0.6rem;font-size:0.24rem;color:#6d7888;font-family:'fzltzh';flex-shrink:0;}
.form-row input,.form-row select,.form-row textarea{flex:1;min-width:3rem;padding:0.12rem 0.24rem;border:1px solid #d0d0d0;border-radius:0.1rem;font-size:0.22rem;color:#494949;background:#efefef;font-family:'fzlth';}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#2362af;background:#fff;}
.form-row textarea{min-height:5rem;font-family:monospace;font-size:0.2rem;line-height:1.6;resize:vertical;}
.form-row input[type=checkbox]{flex:none;min-width:auto;width:0.26rem;height:0.26rem;accent-color:#2362af;margin-top:0.18rem;}
.form-row .checkbox-hint{font-size:0.2rem;color:#9fb0cb;line-height:0.6rem;}
.form-actions{display:flex;gap:0.16rem;justify-content:flex-end;margin-top:0.32rem;padding-top:0.28rem;border-top:1px solid #f0f2f5;}
.form-actions button{padding:0.14rem 0.4rem;border-radius:0.1rem;font-size:0.22rem;border:1px solid #d0d0d0;background:#fff;color:#494949;cursor:pointer;font-family:'fzltzh';transition:all 0.15s;}
.form-actions button:hover{background:#f5f8ff;}
.form-actions button.save{background:#2362af;color:#fff;border-color:#2362af;}
.form-actions button.save:hover{background:#1a4d8f;box-shadow:0 0.04rem 0.16rem rgba(35,98,175,0.25);}
.form-actions button.delete{color:#d32f2f;border-color:#fcc;}
.form-actions button.delete:hover{background:#fff5f5;}
.hint{font-size:0.2rem;color:#9fb0cb;margin-top:0.1rem;}

/* ============ Empty / Loading ============ */
.empty{text-align:center;padding:0.8rem 0.2rem;color:#9fb0cb;font-size:0.24rem;font-family:'fzltzh';}

/* ============ Toast ============ */
.toast{position:fixed;bottom:0.4rem;left:50%;transform:translateX(-50%);padding:0.16rem 0.5rem;border-radius:0.08rem;font-size:0.26rem;color:#fff;z-index:99999;pointer-events:none;transition:all 0.25s;opacity:0;font-family:'fzltzh';box-shadow:0 0.02rem 0.16rem rgba(0,0,0,0.12);}
.toast.show{opacity:1;}
.toast.success{background:#2e7d32;}
.toast.error{background:#c62828;}
.toast.info{background:#1565c0;}

/* ============ Content Editor (WYSIWYG) ============ */
.content-editor{min-height:5rem;padding:0.2rem 0.3rem;border:1px solid #d0d0d0;border-radius:0.1rem;background:#fff;font-size:0.22rem;color:#494949;line-height:1.7;outline:none;overflow-y:auto;}
.content-editor:focus{border-color:#2362af;box-shadow:0 0 0 0.04rem rgba(35,98,175,0.1);}

/* formatting toolbar */
.fmt-bar{display:flex;gap:0.1rem;margin-bottom:0.16rem;flex-wrap:wrap;align-items:center;}
.fmt-bar button{height:0.56rem;padding:0 0.2rem;border:1px solid #c5daec;border-radius:0.08rem;background:#fff;font-size:0.2rem;color:#2362af;font-family:'fzltzh';cursor:pointer;transition:all 0.15s;}
.fmt-bar button:hover{background:#e8f4ff;border-color:#5894de;}
.fmt-bar .sep{width:1px;height:0.36rem;background:#c5daec;margin:0 0.04rem;}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-bar-title">信息予你无限 · <span>内容编辑器</span></div>
  <div class="top-bar-right">
    <span class="token-badge none" id="tokenStatus">未设置 Token</span>
    <a href="hafukec.html" target="_blank">预览主站 →</a>
    <a href="#" id="logoutBtn">切换账号</a>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-section">
    <select id="folderSelect"><option value="">请先加载数据...</option></select>
    <button onclick="addFolder()">+ 新建目录</button>
    <button onclick="addDoc()">+ 新建文档</button>
  </div>
  <div class="toolbar-section">
    <span id="editStatus">未加载</span>
    <button class="primary" id="saveBtn" onclick="saveToGitHub()" disabled>保存到 GitHub</button>
    <button class="danger" onclick="reloadFromGitHub()">重新加载</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="folder-panel">
    <h3>目录列表</h3>
    <div class="folder-list" id="folderList"><div class="empty">加载中...</div></div>
  </div>
  <div class="doc-panel">
    <h3 id="docPanelTitle">文档列表</h3>
    <div class="doc-list" id="docList"><div class="empty">请先选择一个目录</div></div>
    <div class="edit-form" id="editForm" style="display:none;"></div>
  </div>
</div>

<!-- Token overlay -->
<div class="token-overlay" id="tokenOverlay">
  <div class="token-box">
    <h2>设置 GitHub Token</h2>
    <p class="desc">
      需要一个 GitHub Personal Access Token 来保存修改。<br>
      前往 <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
      创建 Classic Token，勾选 <b>repo</b> 权限<br>
      将生成的 Token 粘贴到下方<br>
      <span class="warn">Token 仅保存在你浏览器中，不上传任何服务器。</span>
    </p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <button class="btn-save" id="saveTokenBtn">保存并加载数据</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ==================== Constants ====================
var OWNER = 'xiaogan03';
var REPO = 'hafukec';
var BRANCH = 'master';
var FILE_PATH = 'data.json';
var API_BASE = 'https://api.github.com';
var RAW_URL = 'https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/' + BRANCH + '/' + FILE_PATH;

// ==================== State ====================
var data = null;
var currentSha = null;
var selectedFolderId = null;
var selectedDocId = null;
var editingFolder = null;
var editingDoc = null;
var token = localStorage.getItem('gh_token') || '';

// ==================== DOM ====================
var $ = function(s){ return document.querySelector(s); };
var dom = {
  tokenOverlay: $('#tokenOverlay'),
  tokenInput: $('#tokenInput'),
  tokenStatus: $('#tokenStatus'),
  folderSelect: $('#folderSelect'),
  folderList: $('#folderList'),
  docList: $('#docList'),
  docPanelTitle: $('#docPanelTitle'),
  editForm: $('#editForm'),
  editStatus: $('#editStatus'),
  saveBtn: $('#saveBtn'),
  toast: $('#toast')
};

// ==================== Utils ====================
function escHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function utf8ToBase64(str) {
  var bytes = new TextEncoder().encode(str);
  var bin = '';
  for (var i = 0; i < bytes.length; i++) { bin += String.fromCharCode(bytes[i]); }
  return btoa(bin);
}

// ==================== Toast ====================
var toastTimer = null;
function showToast(msg, type){
  type = type || 'info';
  clearTimeout(toastTimer);
  dom.toast.textContent = msg;
  dom.toast.className = 'toast show ' + type;
  toastTimer = setTimeout(function(){ dom.toast.className = 'toast'; }, 2500);
}

// ==================== Token ====================
function saveToken(){
  token = dom.tokenInput.value.trim();
  if (!token) { showToast('请输入 Token', 'error'); return; }
  localStorage.setItem('gh_token', token);
  dom.tokenOverlay.style.display = 'none';
  dom.tokenStatus.textContent = '已连接';
  dom.tokenStatus.className = 'token-badge ok';
  loadFromGitHub();
}

function setupToken(){
  if (token) {
    dom.tokenInput.value = token;
    dom.tokenOverlay.style.display = 'none';
    dom.tokenStatus.textContent = '已连接';
    dom.tokenStatus.className = 'token-badge ok';
    loadFromGitHub();
  } else {
    dom.tokenOverlay.style.display = 'flex';
    dom.tokenStatus.textContent = '未设置 Token';
    dom.tokenStatus.className = 'token-badge none';
  }
}

$('#logoutBtn').addEventListener('click', function(){
  localStorage.removeItem('gh_token');
  token = '';
  data = null;
  currentSha = null;
  selectedFolderId = null;
  selectedDocId = null;
  editingFolder = null;
  editingDoc = null;
  dom.tokenOverlay.style.display = 'flex';
  dom.tokenInput.value = '';
  dom.tokenStatus.textContent = '未设置 Token';
  dom.tokenStatus.className = 'token-badge none';
  dom.folderList.innerHTML = '<div class="empty">请先设置 Token</div>';
  dom.docList.innerHTML = '<div class="empty">请先选择一个目录</div>';
  dom.editForm.style.display = 'none';
  dom.saveBtn.disabled = true;
  dom.editStatus.textContent = '未加载';
  dom.folderSelect.innerHTML = '<option value="">请先加载数据...</option>';
});

// ==================== GitHub API ====================
function ghApi(method, path, body){
  var headers = {
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github.v3+json'
  };
  var opts = { method: method, headers: headers };
  if (body) {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(API_BASE + path, opts).then(function(res){
    if (!res.ok) {
      return res.json().then(function(err){
        var e = new Error(err.message || 'API Error ' + res.status);
        e.status = res.status;
        throw e;
      });
    }
    return res.json();
  });
}

function loadFromGitHub(){
  dom.editStatus.textContent = '加载中...';

  // Load data from raw URL (avoids base64 encoding issues)
  // Get SHA from API (needed for saving)
  var apiUrl = '/repos/' + OWNER + '/' + REPO + '/contents/' + FILE_PATH + '?ref=' + BRANCH;

  Promise.all([
    fetch(RAW_URL).then(function(r){ return r.json(); }),
    ghApi('GET', apiUrl).then(function(r){ return r.sha; })
  ])
  .then(function(results){
    data = results[0];
    currentSha = results[1];
    dom.editStatus.textContent = '已加载 (SHA: ' + currentSha.substr(0,7) + ')';
    dom.saveBtn.disabled = false;
    renderAll();
    showToast('数据加载成功', 'success');
  })
  .catch(function(err){
    dom.editStatus.textContent = '加载失败';
    showToast('加载失败: ' + err.message, 'error');
    if (err.status === 401) {
      localStorage.removeItem('gh_token');
      token = '';
      setupToken();
    }
  });
}

function reloadFromGitHub(){
  if (confirm('重新加载会丢弃当前所有未保存的修改，确定？')) {
    editingFolder = null;
    editingDoc = null;
    loadFromGitHub();
  }
}

function saveToGitHub(){
  if (!data || !currentSha) { showToast('没有数据可保存', 'error'); return; }

  autoSaveEdit();

  var content = JSON.stringify(data, null, 2);
  var body = {
    message: '更新内容 [admin editor]',
    content: utf8ToBase64(content),
    sha: currentSha,
    branch: BRANCH
  };

  dom.saveBtn.disabled = true;
  dom.saveBtn.textContent = '保存中...';
  dom.editStatus.textContent = '保存中...';

  ghApi('PUT', '/repos/' + OWNER + '/' + REPO + '/contents/' + FILE_PATH, body)
    .then(function(res){
      currentSha = res.content.sha;
      dom.editStatus.textContent = '已保存 (SHA: ' + currentSha.substr(0,7) + ')';
      dom.saveBtn.disabled = false;
      dom.saveBtn.textContent = '保存到 GitHub';
      showToast('保存成功！页面将在 1-2 分钟后更新', 'success');
      renderAll();
    })
    .catch(function(err){
      dom.editStatus.textContent = '保存失败';
      dom.saveBtn.disabled = false;
      dom.saveBtn.textContent = '保存到 GitHub';
      showToast('保存失败: ' + err.message, 'error');
    });
}

function autoSaveEdit(){
  if (editingFolder) { saveFolderEdit(); }
  if (editingDoc) { saveDocEdit(); }
}

// ==================== Rendering ====================
function renderAll(){
  selectedFolderId = null;
  selectedDocId = null;
  editingFolder = null;
  editingDoc = null;
  dom.editForm.style.display = 'none';
  renderFolderList();
  renderFolderSelect();
  dom.docList.innerHTML = '<div class="empty">请先选择一个目录</div>';
  dom.docPanelTitle.textContent = '文档列表';
}

function renderFolderList(){
  if (!data || !data.folders) return;
  var html = '';
  data.folders.forEach(function(folder, idx){
    html += '<div class="folder-item' + (selectedFolderId === folder.id ? ' active' : '') + '" data-id="' + folder.id + '">';
    html += '<div>';
    html += '<div class="name">' + escHtml(folder.name) + '</div>';
    html += '<div class="meta">';
    if (folder.locked) html += '<span class="locked">加密</span>';
    html += '<span>ID: ' + escHtml(folder.id) + '</span>';
    html += '</div></div>';
    html += '<div class="actions">';
    html += '<button data-action="edit-folder" data-idx="' + idx + '">编辑</button>';
    html += '<button class="del" data-action="del-folder" data-idx="' + idx + '">删除</button>';
    html += '</div>';
    html += '</div>';
  });
  dom.folderList.innerHTML = html || '<div class="empty">暂无目录</div>';
}

function renderFolderSelect(){
  if (!data || !data.folders) return;
  var html = '<option value="">选择目录...</option>';
  data.folders.forEach(function(folder){
    html += '<option value="' + folder.id + '"' + (selectedFolderId === folder.id ? ' selected' : '') + '>' + escHtml(folder.name) + '</option>';
  });
  dom.folderSelect.innerHTML = html;
}

function renderDocList(){
  if (!selectedFolderId) {
    dom.docList.innerHTML = '<div class="empty">请先选择一个目录</div>';
    dom.docPanelTitle.textContent = '文档列表';
    return;
  }
  var docs = (data.documents && data.documents[selectedFolderId]) ? data.documents[selectedFolderId] : [];
  var folder = data.folders.find(function(f){ return f.id === selectedFolderId; });
  dom.docPanelTitle.textContent = '文档列表 — ' + (folder ? folder.name : selectedFolderId);

  if (docs.length === 0) {
    dom.docList.innerHTML = '<div class="empty">此目录下暂无文档</div>';
    return;
  }

  var html = '';
  docs.forEach(function(doc, idx){
    html += '<div class="doc-item' + (selectedDocId === doc.id ? ' active' : '') + '" data-id="' + doc.id + '">';
    html += '<div>';
    html += '<div class="name">' + escHtml(doc.name) + '</div>';
    html += '<div class="meta">';
    html += '<span>' + escHtml(doc.type) + '</span>';
    if (doc.locked) html += '<span class="locked">加密</span>';
    html += '<span>ID: ' + escHtml(doc.id) + '</span>';
    html += '</div></div>';
    html += '<div class="actions">';
    html += '<button data-action="edit-doc" data-idx="' + idx + '">编辑</button>';
    html += '<button class="del" data-action="del-doc" data-idx="' + idx + '">删除</button>';
    html += '</div>';
    html += '</div>';
  });
  dom.docList.innerHTML = html;
}

function saveFolderEdit(){
  if (!editingFolder) return;
  var name = $('#ef-name').value.trim();
  var id = $('#ef-id').value.trim();
  var icon = $('#ef-icon').value.trim();
  var locked = $('#ef-locked').checked;
  var password = $('#ef-password').value;

  if (!name || !id) { showToast('名称和 ID 不能为空', 'error'); return; }

  var folder = { id: id, name: name, icon: icon, locked: locked, password: locked ? password : '' };

  if (editingFolder.idx >= 0) {
    var oldId = editingFolder.folder.id;
    if (oldId !== id && data.documents && data.documents[oldId]) {
      data.documents[id] = data.documents[oldId];
      delete data.documents[oldId];
    }
    data.folders[editingFolder.idx] = folder;
  } else {
    data.folders.push(folder);
    if (!data.documents) data.documents = {};
    data.documents[id] = [];
  }

  editingFolder = null;
  dom.editForm.style.display = 'none';
  selectedFolderId = id;
  renderFolderList();
  renderFolderSelect();
  renderDocList();
  dom.folderSelect.value = id;
  showToast('目录已更新（请保存到 GitHub）', 'info');
}

function saveDocEdit(){
  if (!editingDoc || !selectedFolderId) return;
  var name = $('#ed-name').value.trim();
  var id = $('#ed-id').value.trim();
  var type = $('#ed-type').value;
  var locked = $('#ed-locked').checked;
  var password = $('#ed-password').value;
  var src = $('#ed-src').value.trim();
  var content = $('#ed-content').innerHTML;

  if (!name || !id) { showToast('名称和 ID 不能为空', 'error'); return; }

  var doc = { id: id, name: name, type: type, locked: locked, password: locked ? password : '', src: src, content: type === 'text' ? content : '' };

  if (!data.documents) data.documents = {};
  if (!data.documents[selectedFolderId]) data.documents[selectedFolderId] = [];

  if (editingDoc.idx >= 0) {
    data.documents[selectedFolderId][editingDoc.idx] = doc;
  } else {
    data.documents[selectedFolderId].push(doc);
  }

  editingDoc = null;
  dom.editForm.style.display = 'none';
  selectedDocId = id;
  renderDocList();
  showToast('文档已更新（请保存到 GitHub）', 'info');
}

function cancelEdit(){
  editingFolder = null;
  editingDoc = null;
  dom.editForm.style.display = 'none';
}

// ==================== Event Delegation ====================
dom.folderList.addEventListener('click', function(e){
  var folderItem = e.target.closest('.folder-item');
  var btn = e.target.closest('button');

  if (btn) {
    var action = btn.getAttribute('data-action');
    var idx = parseInt(btn.getAttribute('data-idx'));

    if (action === 'edit-folder') {
      autoSaveEdit();
      showFolderEdit(data.folders[idx], idx);
      return;
    }
    if (action === 'del-folder') {
      if (!confirm('确定删除目录 "' + data.folders[idx].name + '" 及其所有文档？此操作不可恢复。')) return;
      var folderId = data.folders[idx].id;
      data.folders.splice(idx, 1);
      if (data.documents && data.documents[folderId]) delete data.documents[folderId];
      editingFolder = null;
      dom.editForm.style.display = 'none';
      selectedFolderId = null;
      renderFolderList();
      renderFolderSelect();
      dom.docList.innerHTML = '<div class="empty">请先选择一个目录</div>';
      showToast('目录已删除（请保存到 GitHub）', 'info');
      return;
    }
  }

  if (folderItem) {
    autoSaveEdit();
    var fid = folderItem.getAttribute('data-id');
    selectedFolderId = fid;
    selectedDocId = null;
    renderFolderList();
    renderFolderSelect();
    renderDocList();
    dom.folderSelect.value = fid;
  }
});

dom.docList.addEventListener('click', function(e){
  var docItem = e.target.closest('.doc-item');
  var btn = e.target.closest('button');

  if (btn) {
    var action = btn.getAttribute('data-action');
    var idx = parseInt(btn.getAttribute('data-idx'));

    if (action === 'edit-doc') {
      autoSaveEdit();
      var docs = data.documents[selectedFolderId] || [];
      showDocEdit(docs[idx], idx);
      return;
    }
    if (action === 'del-doc') {
      var docs = data.documents[selectedFolderId] || [];
      if (!confirm('确定删除文档 "' + docs[idx].name + '"？')) return;
      docs.splice(idx, 1);
      editingDoc = null;
      dom.editForm.style.display = 'none';
      selectedDocId = null;
      renderDocList();
      showToast('文档已删除（请保存到 GitHub）', 'info');
      return;
    }
  }

  if (docItem) {
    autoSaveEdit();
    var did = docItem.getAttribute('data-id');
    selectedDocId = did;
    renderDocList();
    var docs = data.documents[selectedFolderId] || [];
    var idx = docs.findIndex(function(d){ return d.id === did; });
    if (idx >= 0) showDocEdit(docs[idx], idx);
  }
});

dom.folderSelect.addEventListener('change', function(){
  autoSaveEdit();
  selectedFolderId = this.value;
  selectedDocId = null;
  renderFolderList();
  renderDocList();
});

// Format toolbar event delegation
document.addEventListener('click', function(e){
  var btn = e.target.closest('[data-fmt]');
  if (!btn) return;
  e.preventDefault();
  var cmd = btn.getAttribute('data-fmt');
  var arg = btn.getAttribute('data-fmt-arg') || null;
  var ed = document.getElementById('ed-content');
  if (ed) ed.focus();
  document.execCommand(cmd, false, arg);
});
